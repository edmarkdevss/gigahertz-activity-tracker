  const totalHours = (allMins / 60).toFixed(1);
  const uDays = [...new Set(tasks.map(t => t.date))].length;

  const handlePhotoChange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (ev) => {
      setLoading(true);
      const b64 = ev.target.result;
      const res = await api.updatePhoto({ userId: user.id, photoBase64: b64 });
      setLoading(false);
      if (res.success) {
        onUpdateUser({ ...user, photoBase64: b64 });
        pushNotif('Profile photo updated!', 'success');
      } else {
        pushNotif(res.error || 'Failed to update photo', 'error');
      }
    };
    reader.readAsDataURL(file);
  };

  const handleSaveBio = async () => {
    setSavingBio(true);
    const res = await localAPI.updateBio({ userId: user.id, bio });
    if(res.success) {
      onUpdateUser({ ...user, bio });
      pushNotif('Bio updated successfully!', 'success');
    }
    setSavingBio(false);
  };

  const defaultAvatar = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%238890aa'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z'/%3E%3C/svg%3E";

  return (
    <div className="page">
      <div className="page-hdr">
        <div>
          <h1 className="page-title">My Profile</h1><p className="page-sub">Manage your account and view your stats</p>
        </div>
      </div>
      
      <div className="profile-grid">
        <div className="stat-card" style={{ textAlign: 'center', padding: '40px 24px' }}>
          <div className="avatar-wrapper">
            <img src={user?.photoBase64 || localStorage.getItem(`gh_photo_${user?.id}`) || defaultAvatar} className="avatar-img" alt="Profile" />
            {loading ? (
              <div className="avatar-btn" style={{ cursor: 'wait' }}><span className="spinner" style={{ width: 16, height: 16, borderWidth: 2 }} /></div>
            ) : (
              <button onClick={() => fileInputRef.current.click()} className="avatar-btn" title="Change Profile Picture">
                 <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
              </button>
            )}
            <input type="file" accept="image/*" ref={fileInputRef} style={{ display: 'none' }} onChange={handlePhotoChange} disabled={loading} />
          </div>
          <h2 style={{ fontSize: 20, fontWeight: 800, color: 'var(--tx)', marginBottom: 6 }}>{user?.firstName} {user?.lastName}</h2>
          <p style={{ fontSize: 13.5, color: 'var(--tx2)', marginBottom: 16, fontWeight:500 }}>{user?.empId}</p>
          
          <div style={{ display: 'flex', justifyContent: 'center', gap: 8, flexWrap: 'wrap' }}>
            {user?.dept && <span className="dur-badge" style={{ padding: '6px 14px', fontSize: 12 }}>{user.dept}</span>}
          </div>

          <div style={{marginTop: 24, textAlign: 'left'}}>
            <label style={{fontSize:11, fontWeight:700, color:'var(--tx2)', display:'block', marginBottom:8, textTransform:'uppercase'}}>Role / Bio</label>
            <textarea className="bio-textarea" placeholder="Add your role or a short bio..." value={bio} onChange={e => setBio(e.target.value)}></textarea>
            <button className="btn btn-p" style={{width: '100%'}} onClick={handleSaveBio} disabled={savingBio}>{savingBio ? 'Saving...' : 'Save Bio'}</button>
          </div>
        </div>

        <div>
          <div className="stat-grid" style={{ gridTemplateColumns: '1fr 1fr' }}>
            <div className="stat-card">
              <div className="stat-lbl">Total Tasks Logged</div>
              <div className="stat-val">{tasks.length}</div>
            </div>
            <div className="stat-card">
              <div className="stat-lbl">Total Hours</div>
              <div className="stat-val">{totalHours} <span style={{fontSize: 15, color: 'var(--tx3)'}}>hrs</span></div>
            </div>
            <div className="stat-card">
              <div className="stat-lbl">Active Days</div>
              <div className="stat-val">{uDays}</div>
            </div>
            <div className="stat-card">
              <div className="stat-lbl">Avg. Hours / Day</div>
              <div className="stat-val">{uDays ? (totalHours / uDays).toFixed(1) : 0} <span style={{fontSize: 15, color: 'var(--tx3)'}}>hrs</span></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

// ══ IDLE WATCHER ══
const IdleWatcher=({user,onIdleOut})=>{
  const [idleSecs,setIdleSecs]=useState(0);
  const [showPopup,setShowPopup]=useState(false);
  const [popSecs,setPopSecs]=useState(0);
  const lastAct=useRef(Date.now());
  const reset=useCallback(()=>{ lastAct.current=Date.now(); if(!showPopup)setIdleSecs(0); },[showPopup]);
  useEffect(()=>{ const evts=['mousemove','mousedown','keydown','touchstart','click','scroll']; evts.forEach(e=>window.addEventListener(e,reset,{passive:true})); return()=>evts.forEach(e=>window.removeEventListener(e,reset)); },[reset]);
  useEffect(()=>{ const t=setInterval(()=>{ const s=Math.floor((Date.now()-lastAct.current)/1000); setIdleSecs(s); if(s>=IDLE_WARN&&!showPopup){setShowPopup(true);setPopSecs(0);} },1000); return()=>clearInterval(t); },[showPopup]);
  useEffect(()=>{ if(!showPopup)return; const t=setInterval(()=>setPopSecs(p=>{ const n=p+1; if(n>=IDLE_MAX-IDLE_WARN){clearInterval(t);setShowPopup(false);onIdleOut&&onIdleOut(idleSecs);} return n; }),1000); return()=>clearInterval(t); },[showPopup]);
  const here=()=>{ setShowPopup(false);setIdleSecs(0);lastAct.current=Date.now(); fireLog('IDLE_DISMISSED',`Back after ${Math.round(idleSecs/60)} min idle`,user); };
  const out=()=>{ setShowPopup(false);setIdleSecs(0);lastAct.current=Date.now(); fireLog('IDLE_OUT',`Away after ${Math.round(idleSecs/60)} min idle`,user); onIdleOut&&onIdleOut(idleSecs); };
  const grace=IDLE_MAX-IDLE_WARN, pct=Math.min(100,(popSecs/grace)*100);
  const mm=String(Math.floor(idleSecs/60)).padStart(2,'0'), ss=String(idleSecs%60).padStart(2,'0');
  if(!showPopup)return null;
  return(
    <div className="idle-overlay">
      <div className="idle-card">
        <div className="idle-icon">⏰</div>
        <div className="idle-title">Still there?</div>
        <div className="idle-msg">No activity for <strong>{Math.round(idleSecs/60)} minutes</strong>.<br/>Your session clock is still running.</div>
        <div className="idle-time">{mm}:{ss}</div>
        <div className="idle-btns"><button className="idle-here" onClick={here}>👋 I'm here</button><button className="idle-out" onClick={out}>🚶 I stepped away</button></div>
        <div className="idle-prog-wrap"><div className="idle-prog-fill" style={{width:`${pct}%`,background:pct>70?'var(--danger)':'var(--warn)'}}/></div>
        <p style={{fontSize:10.5,color:'var(--tx3)',marginTop:9, fontWeight:600}}>Auto-dismissing in {grace-popSecs}s</p>
      </div>
    </div>
  );
};

// ══ ROOT APP ══
const IDLE_WARN=5*60, IDLE_MAX=10*60;

const App=()=>{
  const [page,setPage]=useState('login');
  const [regData,setRegData]=useState(null);
  const [user,setUser]=useState(null);
  const [loginTime,setLoginTime]=useState(null);
  const [tasks,setTasks]=useState([]);
  const [activeTimer,setActiveTimer]=useState(null);
  const [elapsed,setElapsed]=useState(0);
  const [notif,setNotif]=useState(null);
  const [notifHistory, setNotifHistory] = useState([]);
  const [darkMode,setDarkMode]=useState(()=>localStorage.getItem('gh_dark')==='1');

  const pushNotif = useCallback((msg, type) => {
    setNotif({msg, type});
    setNotifHistory(prev => [{id: Date.now(), msg, type, time: new Date()}, ...prev].slice(0, 10));
  }, []);

  useEffect(()=>{ document.documentElement.setAttribute('data-theme',darkMode?'dark':'light'); localStorage.setItem('gh_dark',darkMode?'1':'0'); },[darkMode]);
  const toggleDark=()=>setDarkMode(d=>!d);

  useEffect(()=>{
    const saved=localStorage.getItem('gh_user');
    const lt=localStorage.getItem('gh_login_time');
    if(saved){
      const u=JSON.parse(saved); setUser(u);
      if(lt){ const d=lt.split('T')[0]; if(d===todayStr())setLoginTime(lt); else{ const n=new Date().toISOString(); setLoginTime(n); localStorage.setItem('gh_login_time',n); } }
      setPage('dashboard'); loadTasks(u);
    }
  },[]);

  // ⚡ ACTIVITY TRACKING FIX: Intercepts and logs all button clicks silently
  useEffect(() => {
    const handleGlobalClick = (e) => {
      const btn = e.target.closest('button');
      if (btn && user) {
        // Grab the text inside the button to know what they clicked
        const actionName = btn.innerText ? btn.innerText.replace(/[\u00A0-\u9999<>\&]/g, '').trim() : 'Icon Button';
        if (actionName) {
          fireLog('BUTTON_CLICK', `Clicked: ${actionName}`, user);
        }
      }
    };
    document.addEventListener('click', handleGlobalClick);
    return () => document.removeEventListener('click', handleGlobalClick);
  }, [user]);

  useEffect(()=>{ 
    if(!activeTimer || activeTimer.isPaused) return; 
    const t=setInterval(()=>setElapsed(e=>e+1),1000); 
    return()=>clearInterval(t); 
  },[activeTimer]);

  const loadTasks=async(u)=>{
    const uid=u?.id||user?.id; if(!uid)return;
    const res=await api.getTasks({userId:uid,startDate:'2020-01-01',endDate:todayStr()});
    if(res.success)setTasks(res.tasks);
  };

  const doLogin=(u)=>{
    const lt=new Date().toISOString();
    setUser(u);setLoginTime(lt);
    localStorage.setItem('gh_user',JSON.stringify(u));
    localStorage.setItem('gh_login_time',lt);
    loadTasks(u);setPage('dashboard');
    pushNotif(`Welcome back, ${u.firstName}! 👋`, 'success');
    fireLog('LOGIN',` Login successful`,u);
  };

  const doRegister=(u)=>{
    const lt=new Date().toISOString();
    setUser(u);setLoginTime(lt);
    localStorage.setItem('gh_user',JSON.stringify(u));
    localStorage.setItem('gh_login_time',lt);
    setTasks([]);setPage('dashboard');
    pushNotif(`Account created! Your ID is ${u.empId} 🎉`, 'success');
    fireLog('REGISTER',`Account created: ${u.firstName} ${u.lastName} <${u.empId}>`,u);
  };

  const handleUpdateUser = (updatedUser) => {
    setUser(updatedUser);
    localStorage.setItem('gh_user', JSON.stringify(updatedUser));
  };

  const doLogout=async()=>{
    if(user){ fireLog('LOGOUT',`User logged out`,user); }
    setUser(null);setLoginTime(null);setTasks([]);setActiveTimer(null);setElapsed(0);
    localStorage.removeItem('gh_user');localStorage.removeItem('gh_login_time');
    setPage('login');
  };

  const handleIdleOut=(idleSecs)=>{
    if(activeTimer && !activeTimer.isPaused){
      setActiveTimer(p => ({...p, isPaused: true}));
      pushNotif(`⏸ Timer paused automatically — ${Math.round(idleSecs/60)} min idle`, 'error');
    }
  };

  const pages=['dashboard','tasks','analytics','profile'];
  return(
    <>
      {notif&&<Notif msg={notif.msg} type={notif.type} onDone={()=>setNotif(null)}/>}
      {page==='login'         &&<LoginPage     onLogin={doLogin}  onGoRegister={()=>setPage('register')} onForgot={()=>setPage('forgot-pw')} darkMode={darkMode} toggleDark={toggleDark}/>}
      {page==='forgot-pw'     &&<ForgotPwPage  onBack={()=>setPage('login')} darkMode={darkMode} toggleDark={toggleDark}/>}
      {page==='register'      &&<RegisterStep1 onNext={d=>{setRegData(d);setPage('register-face');}} onGoLogin={()=>setPage('login')} darkMode={darkMode} toggleDark={toggleDark}/>}
      {page==='register-face' &&<RegisterStep2 formData={regData} onRegister={doRegister} onGoLogin={()=>setPage('login')}/>}
      {pages.includes(page)&&user&&(
        <div className="layout">
          <Sidebar page={page} setPage={setPage} user={user} onLogout={doLogout} loginTime={loginTime} darkMode={darkMode} toggleDark={toggleDark} notifHistory={notifHistory}/>
          <main className="main">
            <div className="page-hdr" style={{display: 'flex', justifyContent: 'flex-end', padding: '10px 34px 0 34px', marginBottom: '-20px'}}>
              <button onClick={toggleDark} style={{background:'rgba(136, 144, 170, 0.1)', border:'1px solid var(--bd)', padding:'6px 12px', borderRadius:99, cursor:'pointer', color:'var(--tx2)', fontSize:12, fontWeight:700, display:'flex', alignItems:'center', gap:6}}>
                 {darkMode?'☀ Light Mode':'🌙 Dark Mode'}
              </button>
            </div>
            {page==='dashboard'&&<DashboardPage user={user} tasks={tasks} onTasksChanged={()=>loadTasks(user)} activeTimer={activeTimer} setActiveTimer={setActiveTimer} elapsed={elapsed} setElapsed={setElapsed} loginTime={loginTime} pushNotif={pushNotif}/>}
            {page==='tasks'    &&<TasksPage     user={user} tasks={tasks} onTasksChanged={()=>loadTasks(user)} pushNotif={pushNotif}/>}
            {page==='analytics'&&<AnalyticsPage user={user} tasks={tasks}/>}
            {page==='profile'  &&<ProfilePage   user={user} tasks={tasks} onUpdateUser={handleUpdateUser} pushNotif={pushNotif}/>}
          </main>
          <IdleWatcher user={user} onIdleOut={handleIdleOut}/>
        </div>
      )}
    </>
  );
}; 
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
